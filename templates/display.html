<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <table border="2px">
        <tr>
            <th>id</th>
            <th>name</th>
            <th>email</th>
            <th>mobile</th>
            <th>feedback</th>
        </tr>

        {% for i in OB %}

            <tr>
                <td>{{i.id}}</td>
                <td>{{i.name}}</td>
                <td>{{i.email}}</td>
                <td>{{i.mobile}}</td>
                <td>{{i.feedback}}</td>
            </tr>

        {% endfor %}
        
    </table>


</body>
</html>
